stages:
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

before_script:
  - python3 -m venv .venv
  - source .venv/bin/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt

python-tests:
  stage: test
  script:
    - source .venv/bin/activate
    - pytest --cov=app --cov=rules --cov-report=term --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

deploy-rules:
  stage: deploy
  script:
    - source .venv/bin/activate
    - python -m app.apply_rules
  only:
    - main
    - schedules
